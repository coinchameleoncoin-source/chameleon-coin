<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chameleon Gotchi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { background: #8bac0f; color: #0f380f; font-family: 'Press Start 2P', cursive; text-align: center; margin: 0; padding: 20px; text-transform: uppercase; }
        .game-screen { border: 10px solid #306230; background: #9bb216; padding: 15px; border-radius: 5px; max-width: 350px; margin: auto; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        #pet { width: 120px; height: 120px; margin: 20px auto; display: block; image-rendering: pixelated; animation: bounce 0.8s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        .stats { font-size: 8px; text-align: left; margin-bottom: 15px; }
        .bar-bg { width: 100%; background: #306230; height: 12px; margin: 5px 0 15px; border: 2px solid #0f380f; }
        .bar-fill { height: 100%; background: #8bac0f; width: 50%; transition: width 0.3s; }
        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #306230; color: #8bac0f; border: none; padding: 10px; font-family: 'Press Start 2P'; font-size: 8px; cursor: pointer; border-bottom: 4px solid #0f380f; }
        button:active { border-bottom: 0; margin-top: 4px; }
    </style>
</head>
<body>

<div class="game-screen">
    <div class="stats">
        NÍVEL: <span id="lvl">1</span> | XP: <span id="xp-num">0</span>/100
        <div class="bar-bg"><div id="xp-bar" class="bar-fill" style="width: 0%;"></div></div>
        FOME:
        <div class="bar-bg"><div id="fome-bar" class="bar-fill" style="width: 100%;"></div></div>
        SUJEIRA:
        <div class="bar-bg"><div id="sujeira-bar" class="bar-fill" style="width: 0%;"></div></div>
    </div>

    <img id="pet" src="https://img.icons8.com/pixel-view/512/chameleon.png">

    <div class="buttons">
        <button onclick="fazerAcao('comer')">ALIMENTAR 🦗</button>
        <button onclick="fazerAcao('banho')">BANHO 🛁</button>
    </div>
</div>

<script>
    // Sistema de Save e Dados
    let data = JSON.parse(localStorage.getItem('chameleon_save')) || { lvl: 1, xp: 0, fome: 100, sujeira: 0 };

    function salvar() {
        localStorage.setItem('chameleon_save', JSON.stringify(data));
    }

    function fazerAcao(tipo) {
        if (tipo === 'comer') {
            if(data.fome < 100) {
                data.fome = Math.min(100, data.fome + 20);
                data.xp += 10;
                data.sujeira = Math.min(100, data.sujeira + 5);
                tocarSom(800, 100); // Som de mastigada (Bip)
            }
        } else if (tipo === 'banho') {
            data.sujeira = 0;
            data.xp += 5;
            tocarSom(400, 300); // Som de água (Bip longo)
        }

        if (data.xp >= 100) {
            data.lvl++;
            data.xp = 0;
            alert("LEVEL UP! 🦎💎");
        }
        atualizarTela();
        salvar();
    }

    // Gerador de Som (Não precisa de arquivo MP3!)
    function tocarSom(freq, dur) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + dur/1000);
        osc.stop(ctx.currentTime + dur/1000);
    }

    function atualizarTela() {
        document.getElementById('lvl').innerText = data.lvl;
        document.getElementById('xp-num').innerText = data.xp;
        document.getElementById('xp-bar').style.width = data.xp + "%";
        document.getElementById('fome-bar').style.width = data.fome + "%";
        document.getElementById('sujeira-bar').style.width = data.sujeira + "%";
        
        // Se estiver muito sujo, ele para de pular
        document.getElementById('pet').style.animationDuration = data.sujeira > 70 ? '0s' : '0.8s';
    }

    // Diminuir fome com o tempo
    setInterval(() => {
        data.fome = Math.max(0, data.fome - 1);
        atualizarTela();
        salvar();
    }, 10000);

    atualizarTela();
</script>
</body>
</html>
